# maptap-scoreboard — WhatsApp bot + web scoreboard
# Deployed on the personal-cloud server (nginx proxies maptap.andreweigel.me).
services:
  maptap:
    build: .
    container_name: maptap-scoreboard
    restart: always
    # Without this, node is PID 1 and Linux ignores SIGTERM there — every stop
    # waited out the 10s timeout and got SIGKILLed mid-write to the auth files.
    init: true
    environment:
      # Empty = discovery mode: the bot logs every group JID it sees.
      GROUP_ID: ${GROUP_ID:-}
      TZ: ${TZ:-Europe/Madrid}
      SEASON_START: ${SEASON_START:-2026-01-01}
      # Password for /summary + /admin (HTTP Basic Auth). Empty = those pages locked.
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      # Starting state for the digests; /summary toggles override at runtime.
      DAILY_SUMMARY: ${DAILY_SUMMARY:-false}
      WEEKLY_SUMMARY: ${WEEKLY_SUMMARY:-false}
    volumes:
      # SQLite DB + Baileys WhatsApp session. Losing this = re-scan the QR.
      - ./data:/app/data
    ports:
      - "127.0.0.1:3000:3000"
