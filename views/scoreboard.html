<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MapTap Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --bg: #0a0a18;
    --bg-glow: #16183a;
    --surface: #14162e;
    --surface-2: #191c38;
    --border: #272b52;
    --text: #eef1fb;
    --muted: #8b93bd;
    --primary: #8b5cf6;   /* neon purple */
    --blue: #3b82f6;      /* maptap quiz blue */
    --gold: #fbbf24;      /* leader / 1st */
    --silver: #cbd5e1;
    --bronze: #e0955b;
    --fire: #fb923c;      /* 🔥 high round */
    --panic: #60a5fa;     /* 😱 low round */
    --display: "Russo One", "Segoe UI", system-ui, sans-serif;
    --body: "Chakra Petch", -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px 20px 40px;
    background:
      radial-gradient(1100px 600px at 78% -10%, var(--bg-glow), transparent 60%),
      radial-gradient(800px 500px at 0% 0%, #101433, transparent 55%),
      var(--bg);
    color: var(--text);
    font: 15px/1.55 var(--body);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .wrap { max-width: 1000px; margin: 0 auto; }

  /* ---- Hero ---- */
  .hero {
    display: flex; align-items: center; gap: 28px;
    padding: 8px 4px 28px; flex-wrap: wrap;
  }
  #globe { width: 132px; height: 132px; flex: 0 0 auto; filter: drop-shadow(0 0 30px rgba(59,130,246,.35)); }
  .hero-text { flex: 1 1 260px; min-width: 0; }  /* min-width:0 lets the wordmark wrap instead of forcing page-width overflow */
  .wordmark { font-family: var(--display); font-size: clamp(1.5rem, 5.2vw, 3.1rem); line-height: .98; letter-spacing: .5px; margin: 0; overflow-wrap: break-word; }
  .wordmark .map { color: var(--text); }
  .wordmark .tap { background: linear-gradient(92deg, var(--primary), var(--blue)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .kicker { font-family: var(--display); font-size: .72rem; letter-spacing: .42em; text-transform: uppercase; color: var(--muted); margin: 0 0 6px 2px; }
  .meta { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-top: 12px; color: var(--muted); font-size: .82rem; }
  .status { display: inline-flex; align-items: center; gap: 7px; padding: 4px 11px; border: 1px solid var(--border); border-radius: 999px; background: rgba(255,255,255,.02); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #e5534b; box-shadow: 0 0 8px #e5534b; }
  .dot.on { background: #4ade80; box-shadow: 0 0 8px #4ade80; }

  /* ---- Badges ---- */
  .badges { display: grid; grid-template-columns: repeat(auto-fit, minmax(158px, 1fr)); gap: 14px; margin: 4px 0 30px; }
  .badge {
    position: relative; overflow: hidden;
    background: linear-gradient(160deg, var(--surface-2), var(--surface));
    border: 1px solid var(--border); border-radius: 16px; padding: 15px 17px;
    transition: transform .2s ease, border-color .2s ease;
  }
  .badge::before { content: ""; position: absolute; inset: 0 auto 0 0; width: 3px; background: linear-gradient(var(--primary), var(--blue)); opacity: .8; }
  .badge:hover { transform: translateY(-3px); border-color: #384073; }
  .badge .label { font-size: .68rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); }
  .badge .value { font-family: var(--display); font-size: 1.7rem; line-height: 1.1; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .badge .who { font-size: .82rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ---- Leaderboard ---- */
  .panel { background: linear-gradient(180deg, var(--surface-2), var(--surface)); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
  .panel-head { display: flex; align-items: baseline; justify-content: space-between; padding: 16px 20px 12px; }
  .panel-head h2 { font-family: var(--display); font-size: 1rem; letter-spacing: .04em; margin: 0; }
  .panel-head span { color: var(--muted); font-size: .78rem; }
  .scroll { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; min-width: 660px; }
  thead th { font-size: .66rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); font-weight: 600; padding: 8px 14px 12px; text-align: right; white-space: nowrap; }
  thead th:nth-child(2) { text-align: left; }
  tbody td { padding: 11px 14px; text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; border-top: 1px solid rgba(255,255,255,.045); }
  tbody td:nth-child(2) { text-align: left; }
  tbody tr { transition: background .15s ease; }
  tbody tr:hover { background: rgba(139,92,246,.06); }
  .rank { display: inline-flex; align-items: center; justify-content: center; min-width: 26px; height: 26px; padding: 0 6px; border-radius: 8px; font-family: var(--display); font-size: .82rem; color: var(--muted); }
  .rank.m1 { background: rgba(251,191,36,.16); color: var(--gold); }
  .rank.m2 { background: rgba(203,213,225,.14); color: var(--silver); }
  .rank.m3 { background: rgba(224,149,91,.16); color: var(--bronze); }
  .player { font-weight: 600; font-size: .98rem; }
  .wins { font-family: var(--display); font-size: 1.05rem; }
  tr.leader td { background: linear-gradient(90deg, rgba(251,191,36,.10), transparent 70%); }
  tr.leader .player::after { content: "👑"; margin-left: 8px; font-size: .9em; }
  .pod { color: var(--muted); font-size: .9rem; }
  .pill { display: inline-block; min-width: 34px; padding: 2px 8px; border-radius: 999px; font-size: .82rem; font-variant-numeric: tabular-nums; }
  .pill.fire { background: rgba(251,146,60,.14); color: var(--fire); }
  .pill.panic { background: rgba(96,165,250,.14); color: var(--panic); }
  .pill.zero { background: transparent; color: #4b5273; }
  .empty { text-align: center; color: var(--muted); padding: 40px 0; }

  /* ---- Footer ---- */
  footer { margin-top: 18px; display: flex; gap: 16px; align-items: center; justify-content: space-between; color: var(--muted); font-size: .78rem; flex-wrap: wrap; }
  button { font-family: var(--body); font-weight: 600; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 8px 16px; cursor: pointer; transition: border-color .2s ease, background .2s ease; }
  button:hover { border-color: var(--primary); background: var(--surface); }
  :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 6px; }

  /* row reveal */
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  tbody tr, .badge { animation: rise .35s ease both; }

  @media (prefers-reduced-motion: reduce) {
    *, tbody tr, .badge { animation: none !important; transition: none !important; }
  }
  @media (max-width: 560px) {
    body { padding: 18px 14px 32px; }
    .hero { gap: 16px; }
    #globe { width: 84px; height: 84px; }
    .wm-sub { display: block; font-size: .74em; }  /* "Scoreboard" drops under MAPTAP so the row can't overflow */
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <canvas id="globe" width="264" height="264" aria-hidden="true"></canvas>
    <div class="hero-text">
      <p class="kicker">Daily maptap.gg</p>
      <h1 class="wordmark"><span class="map">MAP</span><span class="tap">TAP</span><span class="wm-sub"> Scoreboard</span></h1>
      <div class="meta">
        <span id="season"></span>
        <span class="status"><span class="dot" id="wadot"></span>WhatsApp</span>
      </div>
    </div>
  </header>

  <div class="badges" id="badges"></div>

  <section class="panel">
    <div class="panel-head">
      <h2>Leaderboard</h2>
      <span id="count"></span>
    </div>
    <div class="scroll">
      <table>
        <thead><tr>
          <th>#</th><th>Player</th><th>Wins</th><th>Podium</th><th>Avg</th>
          <th>Best</th><th>Played</th><th>Part.</th><th>🔥</th><th>😱</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </section>

  <footer>
    <span id="updated"></span>
    <button onclick="load()">↻ Reload</button>
  </footer>
</div>

<script>
const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function badge(label, value, who) {
  return `<div class="badge"><div class="label">${label}</div>
    <div class="value">${esc(value)}</div><div class="who">${esc(who || '')}</div></div>`;
}
const medal = (i) => i < 3 ? `m${i + 1}` : '';
const fp = (n, cls) => `<span class="pill ${n > 0 ? cls : 'zero'}">${n}</span>`;

async function load() {
  const s = await (await fetch('/api/standings')).json();
  document.getElementById('season').textContent = `Season since ${s.seasonStart} · ${s.activeDays} active days`;
  document.getElementById('count').textContent = `${s.leaderboard.length} players`;
  document.getElementById('updated').textContent = 'Updated ' + new Date(s.updatedAt).toLocaleTimeString();

  const b = s.badges;
  document.getElementById('badges').innerHTML = [
    b.record && badge('All-time record', b.record.score, `${b.record.name} · ${b.record.date}`),
    b.mostFire && badge('Most 🔥 rounds', b.mostFire.count, b.mostFire.name),
    b.mostPanic && badge('Most 😱 rounds', b.mostPanic.count, b.mostPanic.name),
    b.currentWinStreak && badge('Win streak', b.currentWinStreak.length, b.currentWinStreak.name),
    b.longestParticipationStreak && badge('Longest run', b.longestParticipationStreak.length + ' days', b.longestParticipationStreak.name),
  ].filter(Boolean).join('');

  document.getElementById('rows').innerHTML = s.leaderboard.map((p, i) => `
    <tr class="${i === 0 && p.wins > 0 ? 'leader' : ''}" style="animation-delay:${Math.min(i * 30, 400)}ms">
      <td><span class="rank ${medal(i)}">${i + 1}</span></td>
      <td class="player">${esc(p.name)}</td>
      <td class="wins">${p.wins}</td>
      <td class="pod">${p.podiums.join(' / ')}</td>
      <td>${p.avgFinal}</td><td>${p.best}</td>
      <td>${p.played}</td><td>${p.participationPct}%</td>
      <td>${fp(p.fireRounds, 'fire')}</td><td>${fp(p.panicRounds, 'panic')}</td>
    </tr>`).join('') || '<tr><td colspan="10" class="empty">No results yet — post a maptap.gg score in the group.</td></tr>';

  const h = await (await fetch('/healthz')).json();
  document.getElementById('wadot').className = 'dot' + (h.whatsappConnected ? ' on' : '');
}

// --- Dotted globe: Fibonacci-distributed points on a sphere, rotated, depth-shaded.
// Pure canvas, no deps. Freezes on prefers-reduced-motion.
(function globe() {
  const cv = document.getElementById('globe');
  if (!cv || !cv.getContext) return;
  const ctx = cv.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  cv.width = 132 * dpr; cv.height = 132 * dpr;
  const W = cv.width, H = cv.height, R = W * 0.42, cx = W / 2, cy = H / 2;

  const N = 620, pts = [];
  const golden = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < N; i++) {
    const y = 1 - (i / (N - 1)) * 2;      // 1 → -1
    const r = Math.sqrt(1 - y * y);
    const t = golden * i;
    pts.push([Math.cos(t) * r, y, Math.sin(t) * r]);
  }

  const still = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const tilt = -0.35, ct = Math.cos(tilt), st = Math.sin(tilt);

  function frame(a) {
    ctx.clearRect(0, 0, W, H);
    const glow = ctx.createRadialGradient(cx, cy, R * 0.2, cx, cy, R * 1.25);
    glow.addColorStop(0, 'rgba(59,130,246,0.16)');
    glow.addColorStop(1, 'rgba(59,130,246,0)');
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(cx, cy, R * 1.25, 0, 7); ctx.fill();

    const ca = Math.cos(a), sa = Math.sin(a);
    for (const [px, py, pz] of pts) {
      let x = px * ca - pz * sa, z = px * sa + pz * ca;   // spin around Y
      let y = py * ct - z * st;  z = py * st + z * ct;    // fixed tilt
      const depth = (z + 1) / 2;                           // 0 back → 1 front
      const sx = cx + x * R, sy = cy + y * R;
      ctx.beginPath();
      ctx.arc(sx, sy, 0.6 + depth * 1.4, 0, 7);
      // purple at the back, blue at the front
      ctx.fillStyle = `rgba(${Math.round(120 + depth * 40)},${Math.round(120 + depth * 45)},246,${0.15 + depth * 0.75})`;
      ctx.fill();
    }
  }

  if (still) { frame(0.6); return; }
  let a = 0, last = 0;
  requestAnimationFrame(function loop(t) {
    if (last) a += (t - last) / 1000 * 0.28;
    last = t; frame(a); requestAnimationFrame(loop);
  });
})();

load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
