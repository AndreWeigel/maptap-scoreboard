<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MapTap Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --bg: #070b1c;
    --bg-2: #0a1030;
    --panel: rgba(16, 22, 52, 0.86);  /* opaque enough that a bright globe rotating behind can't drop text below WCAG AA */
    --panel-solid: #121736;
    --border: rgba(130, 155, 255, 0.16);
    --text: #eaf0ff;
    --muted: #98a4d4;
    --cyan: #22d3ee;      /* maptap accent */
    --teal: #2dd4bf;
    --blue: #5b9dff;
    --pink: #f472b6;      /* cute tertiary */
    --gold: #ffd15c;
    --silver: #cdd8ee;
    --bronze: #f0a878;
    --fire: #ff9f45;
    --panic: #7dd3fc;
    /* contribution-calendar shade ramp (empty -> busiest) */
    --l0: rgba(130,155,255,.09); --l1: rgba(34,211,238,.28); --l2: rgba(34,211,238,.5);
    --l3: rgba(34,211,238,.74); --l4: #22d3ee;
    --display: "Fredoka", system-ui, sans-serif;
    --body: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: "VT323", ui-monospace, monospace;   /* retro terminal, for the arcade table */
    --pixel: "Press Start 2P", ui-monospace, monospace;  /* arcade accents only */
  }
  * { box-sizing: border-box; }
  html, body { overflow-x: hidden; }
  body {
    margin: 0; padding: 26px 20px 48px; min-height: 100vh;
    background: radial-gradient(1200px 800px at 50% -5%, var(--bg-2), var(--bg) 70%);
    color: var(--text); font: 15px/1.55 var(--body); -webkit-font-smoothing: antialiased;
  }

  /* ---- Background layers: starfield + rotating earth ---- */
  #stars, #globe-bg, #vignette { position: fixed; inset: 0; z-index: 0; pointer-events: none; border: 0; }
  #stars {
    background-image:
      radial-gradient(1.4px 1.4px at 20% 30%, #ffffff99 40%, transparent),
      radial-gradient(1.2px 1.2px at 75% 20%, #cffafe99, transparent),
      radial-gradient(1.3px 1.3px at 60% 70%, #ffffff88, transparent),
      radial-gradient(1px 1px at 35% 80%, #a5f3fc88, transparent),
      radial-gradient(1.5px 1.5px at 88% 60%, #ffffff77, transparent),
      radial-gradient(1px 1px at 10% 60%, #ffffff66, transparent);
    opacity: .7;
  }
  #globe-bg { z-index: 0; }
  /* keeps text legible: darkens the viewport edges over the globe */
  #vignette { z-index: 0; background: radial-gradient(120% 90% at 50% 32%, transparent 40%, rgba(7,11,28,.55) 100%); }
  body.no-webgl #globe-bg { display: none; }
  body.no-webgl #stars { opacity: .9; }

  .wrap { max-width: 1000px; margin: 0 auto; position: relative; z-index: 1; }

  /* ---- Hero ---- */
  .hero { text-align: center; padding: 26px 0 30px; }
  .kicker, .meta { text-shadow: 0 2px 14px rgba(7, 11, 28, .8); }  /* hero text sits over the bare globe */
  .kicker { display: inline-block; font-family: var(--mono); font-size: 1.16rem; letter-spacing: .28em; text-transform: uppercase; color: var(--cyan); text-decoration: none; margin: 0 0 16px; text-shadow: 0 2px 12px rgba(7,11,28,.85), 0 0 10px rgba(34,211,238,.45); transition: color .15s, text-shadow .15s; }
  .kicker:hover { color: #8af3ff; text-shadow: 0 2px 12px rgba(7,11,28,.85), 0 0 18px rgba(34,211,238,.95); }
  .wordmark { font-family: var(--pixel); font-size: clamp(1.5rem, 6.6vw, 2.7rem); line-height: 1.12; margin: 0; letter-spacing: 1px; text-transform: uppercase; }
  .wordmark .map { color: var(--cyan); text-shadow: 3px 3px 0 rgba(9,12,34,.95), 0 0 20px rgba(34,211,238,.5); }
  .wordmark .tap { color: var(--pink); text-shadow: 3px 3px 0 rgba(9,12,34,.95), 0 0 20px rgba(244,114,182,.5); }
  .wordmark .sub { display: block; font-family: var(--mono); font-size: clamp(1.2rem, 4vw, 1.8rem); letter-spacing: .38em; color: var(--muted); margin-top: 14px; text-shadow: 0 2px 10px rgba(7,11,28,.7); }
  .meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 14px; color: var(--muted); font-size: .84rem; }
  .status { display: inline-flex; align-items: center; gap: 7px; padding: 5px 12px; border: 1px solid var(--border); border-radius: 999px; background: rgba(10, 14, 34, .72); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #f0616a; box-shadow: 0 0 9px #f0616a; }
  .dot.on { background: #4ade80; box-shadow: 0 0 9px #4ade80; }

  /* ---- View tabs (Leaderboard / Daily winners / Calendar); spinning earth marks the active one ---- */
  .viewtoggle { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 4px 0 24px; flex-wrap: wrap; }
  .vt-tab { display: inline-flex; align-items: center; gap: 7px; background: none; border: 1px solid transparent; cursor: pointer; font-family: var(--mono); font-size: 1.06rem; letter-spacing: .04em; color: var(--muted); padding: 5px 13px; border-radius: 999px; transition: color .18s, border-color .18s, text-shadow .18s; }
  .vt-tab:hover { color: var(--text); }
  .vt-tab.active { color: var(--cyan); border-color: rgba(34,211,238,.4); text-shadow: 0 0 12px rgba(34,211,238,.55); }
  .vt-tab .globe { display: none; font-size: 1rem; }
  .vt-tab.active .globe { display: inline-block; animation: spin 8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- Contribution calendar ---- */
  .cal-wrap { overflow-x: auto; padding-bottom: 6px; }
  .cal { display: inline-grid; grid-template-columns: auto 1fr; gap: 4px 6px; }
  .cal-months { grid-column: 2; position: relative; height: 16px; font-size: .72rem; color: var(--muted); font-family: var(--mono); }
  .cal-months span { position: absolute; top: 0; white-space: nowrap; }
  .cal-days { display: grid; grid-template-rows: repeat(7, 13px); gap: 3px; font-size: .64rem; color: var(--muted); font-family: var(--mono); align-items: center; }
  .cal-grid { display: grid; grid-template-rows: repeat(7, 13px); grid-auto-flow: column; grid-auto-columns: 13px; gap: 3px; }
  .cal-cell { width: 13px; height: 13px; border-radius: 3px; background: var(--l0); }
  .cal-cell.l1 { background: var(--l1); } .cal-cell.l2 { background: var(--l2); }
  .cal-cell.l3 { background: var(--l3); } .cal-cell.l4 { background: var(--l4); }
  .cal-cell.today { box-shadow: 0 0 0 1.5px var(--cyan); }
  .cal-legend { display: flex; align-items: center; justify-content: flex-end; gap: 6px; margin-top: 12px; font-size: .72rem; color: var(--muted); font-family: var(--mono); }
  .cal-legend i { width: 13px; height: 13px; border-radius: 3px; display: inline-block; }

  /* ---- Badges ---- */
  .badges { display: grid; grid-template-columns: repeat(auto-fit, minmax(158px, 1fr)); gap: 14px; margin: 6px 0 26px; }
  .badge { position: relative; overflow: hidden; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 15px 18px; transition: transform .2s ease, border-color .2s ease; }
  .badge::before { content: ""; position: absolute; inset: 0 auto 0 0; width: 3px; border-radius: 3px; background: linear-gradient(var(--cyan), var(--blue)); }
  .badge:hover { transform: translateY(-3px); border-color: rgba(34,211,238,.4); }
  .badge .label { font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
  .badge .value { font-family: var(--display); font-weight: 700; font-size: 1.7rem; line-height: 1.1; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .badge .who { font-size: .82rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ---- Leaderboard (glass, globe shows through) ---- */
  /* ---- 90s arcade high-score table ---- */
  .panel { position: relative; background: var(--panel); backdrop-filter: blur(8px); border: 1px solid rgba(34,211,238,.32); border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px -30px rgba(0,0,0,.8), inset 0 0 0 1px rgba(34,211,238,.08), 0 0 26px -6px rgba(34,211,238,.28); }
  .panel::after { content: ""; position: absolute; inset: 0; z-index: 3; pointer-events: none; background: repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,0,0,.16) 2px 3px); } /* CRT scanlines */
  .panel-head { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; padding: 18px 22px 15px; border-bottom: 1px solid rgba(34,211,238,.18); }
  .panel-head h2 { font-family: var(--pixel); font-size: .82rem; margin: 0; color: var(--cyan); letter-spacing: 1px; text-shadow: 0 0 12px rgba(34,211,238,.7); }
  .panel-head span { font-family: var(--mono); color: var(--muted); font-size: 1.05rem; letter-spacing: .5px; }
  .scroll { position: relative; z-index: 1; overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; min-width: 660px; }
  thead th { font-family: var(--mono); font-size: .98rem; text-transform: uppercase; letter-spacing: .12em; color: var(--cyan); font-weight: 400; padding: 12px 16px 12px; text-align: right; white-space: nowrap; text-shadow: 0 0 8px rgba(34,211,238,.4); }
  thead th:nth-child(2) { text-align: left; }
  tbody td { font-family: var(--mono); font-size: 1.3rem; line-height: 1; padding: 9px 16px; text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; color: var(--text); border-top: 1px solid rgba(34,211,238,.1); }
  tbody td:nth-child(2) { text-align: left; }
  tbody tr { transition: background .15s ease; }
  tbody tr:nth-child(even) td { background: rgba(34,211,238,.035); }   /* zebra, high-score style */
  tbody tr:hover td { background: rgba(34,211,238,.1); }
  .rank { display: inline-flex; align-items: center; justify-content: center; min-width: 30px; height: 26px; padding: 0 6px; border-radius: 3px; font-family: var(--pixel); font-size: .6rem; color: var(--muted); background: rgba(255,255,255,.06); box-shadow: inset 0 0 0 1px rgba(255,255,255,.07); }
  .rank.m1 { color: var(--gold); background: rgba(255,209,92,.16); box-shadow: inset 0 0 0 1px rgba(255,209,92,.5), 0 0 12px -2px rgba(255,209,92,.6); }
  .rank.m2 { color: var(--silver); background: rgba(205,216,238,.14); box-shadow: inset 0 0 0 1px rgba(205,216,238,.45), 0 0 10px -2px rgba(205,216,238,.45); }
  .rank.m3 { color: var(--bronze); background: rgba(240,168,120,.16); box-shadow: inset 0 0 0 1px rgba(240,168,120,.5), 0 0 10px -2px rgba(240,168,120,.5); }
  .player { font-family: var(--mono); font-size: 1.42rem; letter-spacing: .5px; color: #f4f7ff; }
  .wins { font-family: var(--pixel); font-size: .82rem; color: var(--cyan); text-shadow: 0 0 10px rgba(34,211,238,.55); }
  .field { color: var(--muted); font-size: .85rem; }
  tr.leader td { background: linear-gradient(90deg, rgba(255,209,92,.16), rgba(255,209,92,.02) 72%) !important; }
  tr.leader .player { color: var(--gold); text-shadow: 0 0 14px rgba(255,209,92,.7); }
  tr.leader .player::after { content: "1ST"; font-family: var(--pixel); font-size: .5rem; margin-left: 10px; color: var(--pink); vertical-align: middle; text-shadow: 0 0 10px rgba(244,114,182,.75); animation: blink 1.2s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .pod { font-family: var(--mono); color: var(--muted); font-size: 1.18rem; }
  .pill { display: inline-block; min-width: 32px; padding: 3px 8px; border-radius: 4px; font-family: var(--mono); font-size: 1.06rem; line-height: 1; font-variant-numeric: tabular-nums; }
  .pill.fire { background: rgba(255,159,69,.16); color: var(--fire); box-shadow: inset 0 0 0 1px rgba(255,159,69,.3); }
  .pill.panic { background: rgba(125,211,252,.16); color: var(--panic); box-shadow: inset 0 0 0 1px rgba(125,211,252,.3); }
  .pill.zero { background: transparent; color: #7580c0; box-shadow: none; }
  .empty { font-family: var(--mono); font-size: 1.2rem; text-align: center; color: var(--muted); padding: 44px 0; }

  footer { margin-top: 20px; display: flex; gap: 16px; align-items: center; justify-content: space-between; color: var(--muted); font-size: .78rem; flex-wrap: wrap; }
  button { font-family: var(--body); font-weight: 600; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 12px; padding: 9px 17px; cursor: pointer; transition: border-color .2s ease, background .2s ease; }
  button:hover { border-color: var(--cyan); background: rgba(34,211,238,.1); }
  :focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; border-radius: 8px; }

  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  tbody tr, .badge { animation: rise .35s ease both; }

  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
  @media (max-width: 560px) {
    body { padding: 18px 14px 34px; }
    .hero { padding: 14px 0 22px; }
    .wordmark .sub { display: block; }  /* "Scoreboard" stacks under MapTap so the centered wordmark can't overflow */
    .meta { flex-direction: column; gap: 8px; }  /* season + status stack so the pill never clips on narrow screens */
  }
</style>
</head>
<body>
<div id="stars"></div>
<div id="vignette"></div>
<canvas id="globe-bg" aria-hidden="true"></canvas>

<div class="wrap">
  <header class="hero">
    <a class="kicker" href="https://www.maptap.gg" target="_blank" rel="noopener">▶ PLAY MAPTAP.GG</a>
    <h1 class="wordmark"><span class="map">Map</span><span class="tap">Tap</span> <span class="sub">Scoreboard</span></h1>
    <div class="meta">
      <span id="season"></span>
      <span class="status"><span class="dot" id="wadot"></span>WhatsApp</span>
    </div>
  </header>

  <div class="badges" id="badges"></div>

  <div class="viewtoggle">
    <button class="vt-tab active" data-view="leaderboard" onclick="setView('leaderboard')"><span class="globe">🌍</span>Leaderboard</button>
    <button class="vt-tab" data-view="history" onclick="setView('history')"><span class="globe">🌍</span>Daily winners</button>
    <button class="vt-tab" data-view="calendar" onclick="setView('calendar')"><span class="globe">🌍</span>Calendar</button>
  </div>

  <section class="panel" id="view-leaderboard">
    <div class="panel-head">
      <h2>Leaderboard</h2>
      <span id="count"></span>
    </div>
    <div class="scroll">
      <table>
        <thead><tr>
          <th>#</th><th>Player</th><th>Wins</th><th>Podium</th><th>Avg</th>
          <th>Best</th><th>Played</th><th>Part.</th>
          <th aria-label="Hot rounds" title="Hot rounds">🔥</th>
          <th aria-label="Panic rounds" title="Panic rounds">😱</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </section>

  <section class="panel" id="view-history" hidden>
    <div class="panel-head">
      <h2>Daily winners</h2>
      <span id="daycount"></span>
    </div>
    <div class="scroll">
      <table>
        <thead><tr>
          <th>Date</th><th>🥇 Winner</th><th>Score</th><th>Field</th>
        </tr></thead>
        <tbody id="history"></tbody>
      </table>
    </div>
  </section>

  <section class="panel" id="view-calendar" hidden>
    <div class="panel-head">
      <h2>Participation calendar</h2>
      <span id="calcount"></span>
    </div>
    <div class="cal-wrap">
      <div class="cal">
        <div class="cal-months" id="cal-months"></div>
        <div class="cal-days"><span style="grid-row:2">Mon</span><span style="grid-row:4">Wed</span><span style="grid-row:6">Fri</span></div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>
    <div class="cal-legend">Less
      <i style="background:var(--l0)"></i><i style="background:var(--l1)"></i><i style="background:var(--l2)"></i><i style="background:var(--l3)"></i><i style="background:var(--l4)"></i>
      More</div>
  </section>

  <footer>
    <span id="updated"></span>
    <button onclick="load()">↻ Reload</button>
  </footer>
</div>

<!-- ===== Data (classic script, unchanged logic) ===== -->
<script>
const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function badge(label, value, who) {
  return `<div class="badge"><div class="label">${label}</div>
    <div class="value">${esc(value)}</div><div class="who">${esc(who || '')}</div></div>`;
}
const medal = (i) => i < 3 ? `m${i + 1}` : '';
const fp = (n, cls) => `<span class="pill ${n > 0 ? cls : 'zero'}">${n}</span>`;
const WD = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmtDate = (s) => { const [y,m,d] = s.split('-').map(Number); const dt = new Date(y, m-1, d); return `${WD[dt.getDay()]} ${d} ${MO[m-1]}`; };

const VIEWS = ['leaderboard', 'history', 'calendar'];
function setView(v) {
  for (const id of VIEWS) document.getElementById('view-' + id).hidden = v !== id;
  document.querySelectorAll('.vt-tab').forEach((el) => el.classList.toggle('active', el.dataset.view === v));
}

// GitHub-style participation calendar, built from the per-day history the API
// already returns. Shade = how many players posted that day.
const ymd = (dt) => `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
function renderCalendar(hist) {
  const grid = document.getElementById('cal-grid'), months = document.getElementById('cal-months');
  grid.innerHTML = ''; months.innerHTML = '';
  if (!hist.length) { document.getElementById('calcount').textContent = '0 days'; return; }

  const byDate = new Map(hist.map((d) => [d.date, d]));
  const maxN = Math.max(...hist.map((d) => d.ranked.length));
  const level = (n) => n === 0 ? 0 : Math.min(4, Math.ceil(4 * n / maxN));

  const parse = (s) => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
  const first = parse(hist.map((d) => d.date).sort()[0]); // API order isn't guaranteed; take the earliest
  const start = new Date(first); start.setDate(start.getDate() - ((start.getDay() + 6) % 7)); // back to Monday
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = ymd(today);

  let col = 0, lastMonth = -1;
  for (let dt = new Date(start); dt <= today; dt.setDate(dt.getDate() + 1)) {
    const key = ymd(dt);
    const day = byDate.get(key);
    const n = day ? day.ranked.length : 0;
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (n ? ' l' + level(n) : '') + (key === todayStr ? ' today' : '');
    if (day) {
      const w = day.ranked.filter((r) => r.rank === 1);
      cell.title = `${fmtDate(key)} · ${n} player${n===1?'':'s'} · 🥇 ${w.map((r)=>r.name).join(', ')} ${w[0].score}`;
    } else cell.title = `${fmtDate(key)} · nobody played`;
    grid.appendChild(cell);
    if (dt.getMonth() !== lastMonth) {          // month label at the current column
      lastMonth = dt.getMonth();
      const lab = document.createElement('span');
      lab.textContent = MO[lastMonth];
      lab.style.left = (col * 16) + 'px';        // 13px cell + 3px gap
      months.appendChild(lab);
    }
    if (((dt.getDay() + 6) % 7) === 6) col++;    // Sunday ends this week column
  }
  document.getElementById('calcount').textContent = `${hist.length} day${hist.length===1?'':'s'} played`;
}

async function load() {
 try {
  const s = await (await fetch('/api/standings')).json();
  document.getElementById('season').textContent = `Season since ${s.seasonStart} · ${s.activeDays} active days`;
  document.getElementById('count').textContent = `${s.leaderboard.length} players`;
  document.getElementById('updated').textContent = 'Updated ' + new Date(s.updatedAt).toLocaleTimeString();

  const b = s.badges;
  const mostConsistent = [...s.leaderboard].sort((a, b) => b.participationPct - a.participationPct)[0];
  document.getElementById('badges').innerHTML = [
    b.record && badge('All-time record', b.record.score, `${b.record.name} · ${b.record.date}`),
    b.mostFire && badge('Most 🔥 rounds', b.mostFire.count, b.mostFire.name),
    mostConsistent && badge('Most consistent 📅', mostConsistent.participationPct + '%', mostConsistent.name),
    b.currentWinStreak && badge('Win streak', b.currentWinStreak.length, b.currentWinStreak.name),
    b.longestParticipationStreak && badge('Longest run', b.longestParticipationStreak.length + ' days', b.longestParticipationStreak.name),
  ].filter(Boolean).join('');

  document.getElementById('rows').innerHTML = s.leaderboard.map((p, i) => `
    <tr class="${i === 0 && p.wins > 0 ? 'leader' : ''}" style="animation-delay:${Math.min(i * 30, 400)}ms">
      <td><span class="rank ${medal(i)}">${i + 1}</span></td>
      <td class="player">${esc(p.name)}</td>
      <td class="wins">${p.wins}</td>
      <td class="pod">${p.podiums.join(' / ')}</td>
      <td>${p.avgFinal}</td><td>${p.best}</td>
      <td>${p.played}</td><td>${p.participationPct}%</td>
      <td>${fp(p.fireRounds, 'fire')}</td><td>${fp(p.panicRounds, 'panic')}</td>
    </tr>`).join('') || '<tr><td colspan="10" class="empty">No results yet — post a maptap.gg score in the group.</td></tr>';

  const hist = s.history || [];
  document.getElementById('daycount').textContent = `${hist.length} day${hist.length === 1 ? '' : 's'}`;
  document.getElementById('history').innerHTML = hist.map((d) => {
    const winners = d.ranked.filter((r) => r.rank === 1);
    const field = d.ranked.filter((r) => r.rank !== 1).map((r) => `${esc(r.name)} ${r.score}`).join(' · ');
    return `<tr>
      <td>${fmtDate(d.date)}</td>
      <td class="player">${winners.map((w) => esc(w.name)).join(', ')}</td>
      <td class="wins">${winners[0].score}</td>
      <td class="field">${field || '—'}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="4" class="empty">No games yet.</td></tr>';

  renderCalendar(hist);

  const h = await (await fetch('/healthz')).json();
  document.getElementById('wadot').className = 'dot' + (h.whatsappConnected ? ' on' : '');
 } catch (e) {
  // Transient failures self-heal on the 5-min interval; only show an error if nothing rendered yet.
  console.error('[scoreboard] load failed:', e);
  const rows = document.getElementById('rows');
  if (!rows.children.length) rows.innerHTML = '<tr><td colspan="10" class="empty">Couldn\'t load standings — retrying…</td></tr>';
 }
}
load();
setInterval(load, 5 * 60 * 1000);
</script>

const cv = document.getElementById('globe-bg');

function haveWebGL() {
  // Probe a THROWAWAY canvas — grabbing a context on the real #globe-bg would pin its
  // type/attributes and stop three.js from getting its preferred WebGL2+alpha context.
  try {
    const c = document.createElement('canvas');
    return !!(window.WebGLRenderingContext && (c.getContext('webgl') || c.getContext('experimental-webgl')));
  } catch (e) { return false; }
}
if (!haveWebGL()) { document.body.classList.add('no-webgl'); }
else {
  try {
    const THREE = await import('three');
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const renderer = new THREE.WebGLRenderer({ canvas: cv, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 100);
    camera.position.z = 7.4; // pulled back so a fuller planet reads, closer to maptap's floating-globe look

    const group = new THREE.Group();
    group.rotation.z = 0.41; // ~23.5° axial tilt
    scene.add(group);

    // Render on decode: a data: URI texture still decodes on a later task, so an eager
    // render (esp. the single reduced-motion frame) would otherwise show an untextured sphere.
    const tex = new THREE.TextureLoader().load(EARTH_TEXTURE, () => renderer.render(scene, camera));
    tex.colorSpace = THREE.SRGBColorSpace;
    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(2, 64, 64),
      new THREE.MeshPhongMaterial({ map: tex, shininess: 6, specular: 0x1b3a5a })
    );
    group.add(earth);

    // cyan atmosphere rim (fresnel glow on a slightly larger back-facing shell)
    const atmo = new THREE.Mesh(
      new THREE.SphereGeometry(2.16, 64, 64),
      new THREE.ShaderMaterial({
        transparent: true, side: THREE.BackSide, blending: THREE.AdditiveBlending,
        vertexShader: `varying vec3 vN; void main(){ vN = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
        fragmentShader: `varying vec3 vN; void main(){ float i = pow(0.80 - dot(vN, vec3(0.0,0.0,1.0)), 1.9); gl_FragColor = vec4(0.28,0.86,0.98,1.0) * clamp(i,0.0,1.25); }`
      })
    );
    group.add(atmo);

    scene.add(new THREE.AmbientLight(0x8899cc, 0.55));
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(-3, 1.2, 3);
    scene.add(sun);

    function applyResize() {
      renderer.setSize(innerWidth, innerHeight);
      camera.aspect = innerWidth / innerHeight;
      // ease the globe up so it sits behind the hero + leaderboard
      camera.setViewOffset(innerWidth, innerHeight, 0, -innerHeight * 0.14, innerWidth, innerHeight);
      camera.updateProjectionMatrix();
      if (reduce) renderer.render(scene, camera);
    }
    applyResize();
    // coalesce bursty resizes (mobile URL-bar show/hide) into one buffer reallocation per frame
    let rzPending = null;
    addEventListener('resize', () => { if (rzPending == null) rzPending = requestAnimationFrame(() => { rzPending = null; applyResize(); }); });

    // ~30fps cap + frame-rate-independent spin, one guarded rAF chain (so tab-hide/show
    // can't spawn a second loop). The visibility listener is attached only when animating,
    // so reduced-motion never starts the loop on tab return.
    let rafId = null, last = 0;
    function tick(t) {
      rafId = requestAnimationFrame(tick);
      if (t - last < 33) return;
      earth.rotation.y += 0.0016 * ((t - last) / 16.7);
      last = t;
      renderer.render(scene, camera);
    }
    function start() { if (rafId == null) { last = 0; rafId = requestAnimationFrame(tick); } }
    function stop() { if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; } }
    if (reduce) {
      earth.rotation.y = 0.6; // the texture onLoad above fires the single static render
    } else {
      start();
      document.addEventListener('visibilitychange', () => { document.hidden ? stop() : start(); });
    }
  } catch (e) {
    console.warn('[globe] failed, falling back:', e);
    document.body.classList.add('no-webgl');
  }
}
