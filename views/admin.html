<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MapTap · Admin</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #070b1c; --bg-2: #0a1030; --panel: rgba(16,22,52,.9); --border: rgba(130,155,255,.16);
    --text: #eaf0ff; --muted: #98a4d4; --cyan: #22d3ee;
    --body: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, "SFMono-Regular", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; padding: 48px 20px; color: var(--text);
    font: 15px/1.5 var(--body); background: radial-gradient(1200px 800px at 50% -5%, var(--bg-2), var(--bg) 70%); }
  .wrap { max-width: 560px; margin: 0 auto; }
  a.back { color: var(--muted); text-decoration: none; font-family: var(--mono); font-size: .95rem; }
  a.back:hover { color: var(--cyan); }
  h1 { font-family: var(--mono); font-size: 1.15rem; letter-spacing: .12em; text-transform: uppercase; color: var(--cyan); margin: 12px 0 20px; }
  .cards { display: grid; gap: 14px; }
  a.card { display: flex; align-items: center; gap: 16px; text-decoration: none; color: inherit;
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 20px 22px;
    transition: transform .15s, border-color .15s; }
  a.card:hover { transform: translateY(-2px); border-color: rgba(34,211,238,.45); }
  .icon { font-size: 1.8rem; line-height: 1; }
  .card .name { font-weight: 700; font-size: 1.1rem; }
  .card .desc { color: var(--muted); font-size: .88rem; margin-top: 2px; }
  .arrow { margin-left: auto; color: var(--muted); font-size: 1.3rem; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">← Scoreboard</a>
  <h1>Admin</h1>
  <div class="cards">
    <a class="card" href="/summary">
      <span class="icon">📣</span>
      <span><span class="name">Digests</span><span class="desc">Turn the daily / weekly group messages on or off, or send one now.</span></span>
      <span class="arrow">→</span>
    </a>
    <a class="card" href="/users">
      <span class="icon">👥</span>
      <span><span class="name">Players</span><span class="desc">Create players, drag WhatsApp ids onto them, switch someone off when they leave.</span></span>
      <span class="arrow">→</span>
    </a>
  </div>
</div>
</body>
</html>
